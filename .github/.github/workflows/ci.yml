name: CI

# Quality gate: lint + unit tests + build for both backend and frontend.
# Triggered on every push to main and every PR.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch (fast feedback).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------
  # Backend: Go 1.23 — vet + race tests + build
  # ----------------------------------------------------------------------
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        env:
          # Tests use repository interfaces (mocks) — no DB required.
          DATABASE_URL: postgres://stub:stub@127.0.0.1:5432/stub?sslmode=disable
          JWT_SECRET: ci-stub-secret-not-real-but-long-enough-for-tests-aaa
        run: go test ./... -race -count=1 -timeout 5m
      - name: Build
        run: go build -trimpath -o /tmp/api ./cmd/api
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: /tmp/api
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------------------
  # Frontend: Node 20 — pnpm install + check + test + build
  # ----------------------------------------------------------------------
  frontend:
    name: Frontend (SvelteKit)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10 --activate
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm check
      - name: Unit tests
        env:
          PUBLIC_API_URL: http://localhost:8080/api/v1
        run: pnpm test
      - name: Build (SvelteKit + PWA)
        env:
          PUBLIC_API_URL: http://localhost:8080/api/v1
        run: pnpm build
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            web/.svelte-kit/output
            web/build
            web/static
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------------------
  # E2E: spin up Postgres + backend, build frontend, run Playwright
  # ----------------------------------------------------------------------
  e2e:
    name: E2E (Playwright + Postgres + Backend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: finanzas
          POSTGRES_PASSWORD: finanzas_dev_password
          POSTGRES_DB: finanzas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finanzas -d finanzas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://finanzas:finanzas_dev_password@localhost:5432/finanzas?sslmode=disable
      JWT_SECRET: ci-e2e-secret-not-real-but-64-chars-aaaaaaaaaaaaaaaaaaaa
      GIN_MODE: release
      PORT: 8080
      CORS_ORIGINS: http://localhost:4173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum
      - name: Install backend
        working-directory: backend
        run: go mod download
      - name: Build backend
        working-directory: backend
        run: go build -o /tmp/api ./cmd/api
      - name: Install frontend
        working-directory: web
        run: corepack enable && corepack prepare pnpm@10 --activate && pnpm install --frozen-lockfile
      - name: Install Playwright
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium
      - name: Start backend
        run: /tmp/api &
        env:
          DATABASE_URL: postgres://finanzas:finanzas_dev_password@localhost:5432/finanzas?sslmode=disable
          JWT_SECRET: ci-e2e-secret-not-real-but-64-chars-aaaaaaaaaaaaaaaaaaaa
          GIN_MODE: release
          PORT: 8080
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/v1/health >/dev/null; then
              echo "Backend up"
              exit 0
            fi
            sleep 1
          done
          echo "Backend never became healthy"
          exit 1
      - name: Build + preview frontend
        working-directory: web
        env:
          PUBLIC_API_URL: http://localhost:8080/api/v1
        run: |
          pnpm build
          (pnpm preview --port 4173 --host 127.0.0.1 &) 
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173/ >/dev/null && break
            sleep 1
          done
      - name: Run Playwright
        working-directory: web
        run: pnpm exec playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7