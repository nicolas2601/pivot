name: CI

# Quality gate: vet + race tests + build (Go) and type-check + tests +
# build (SvelteKit). Triggered on every push to main and every PR.
#
# E2E (Playwright) is intentionally NOT in CI — it is flaky in the
# GitHub Actions sandbox (SvelteKit form-fill timing, headless browser
# constraints, $state binding races during hydration). Run E2E locally
# with `make e2e` (or `pnpm exec playwright test`) against the docker
# compose stack — that's where it actually passes.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch (fast feedback).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------
  # Backend: Go 1.23 — vet + race tests + build
  # ----------------------------------------------------------------------
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/go.sum
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        env:
          # Tests use repository interfaces (mocks) — no DB required.
          DATABASE_URL: postgres://stub:stub@127.0.0.1:5432/stub?sslmode=disable
          JWT_SECRET: ci-stub-secret-not-real-but-long-enough-for-tests-aaa
        run: go test ./... -race -count=1 -timeout 5m
      - name: Build
        run: go build -trimpath -o /tmp/api ./cmd/api
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: /tmp/api
          if-no-files-found: error
          retention-days: 7

  # ----------------------------------------------------------------------
  # Frontend: Node 20 — pnpm install + check + test + build
  # ----------------------------------------------------------------------
  frontend:
    name: Frontend (SvelteKit)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: npm i -g pnpm@10 && pnpm --version
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Type check
        env:
          PUBLIC_API_URL: http://localhost:8080/api/v1
        run: pnpm check
      - name: Unit tests
        env:
          PUBLIC_API_URL: http://localhost:8080/api/v1
        run: pnpm test
      - name: Build (SvelteKit + PWA)
        env:
          PUBLIC_API_URL: http://localhost:8080/api/v1
        run: pnpm build
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            web/.svelte-kit/output
            web/build
            web/static
          if-no-files-found: error
          retention-days: 7