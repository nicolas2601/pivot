services:
  postgres:
    image: postgres:16-alpine
    container_name: finanzas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finanzas
      POSTGRES_PASSWORD: finanzas_dev_password
      POSTGRES_DB: finanzas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finanzas -d finanzas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: